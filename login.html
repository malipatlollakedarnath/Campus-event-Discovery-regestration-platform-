<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Campus Event Platform</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <nav class="navbar">
        <div class="container">
            <div class="logo">Campus Events</div>
            <div class="nav-links">
                <button onclick="window.location.href='index.html'" class="btn-text">Home</button>
            </div>
        </div>
    </nav>

    <main class="auth-container">
        <div class="auth-card">
            <h2>Login</h2>

            <div class="tabs">
                <button class="tab-btn active" onclick="switchTab('student')">Student</button>
                <button class="tab-btn" onclick="switchTab('admin')">Admin</button>
            </div>

            <div id="student-tab" class="tab-content active">
                <form id="studentLoginForm">
                    <div class="form-group">
                        <label for="studentEmail">Email:</label>
                        <input type="email" id="studentEmail" required placeholder="your@email.com">
                    </div>
                    <div class="form-group">
                        <label for="studentPassword">Password:</label>
                        <input type="password" id="studentPassword" required placeholder="Enter password">
                    </div>
                    <button type="submit" class="btn btn-primary full-width">Login</button>
                    <p>Don't have an account? <a href="#" onclick="switchTab('student'); showRegister()">Register here</a></p>
                </form>

                <form id="studentRegisterForm" style="display: none;">
                    <div class="form-group">
                        <label for="studentRegName">Name:</label>
                        <input type="text" id="studentRegName" required placeholder="Your name">
                    </div>
                    <div class="form-group">
                        <label for="studentRegEmail">Email:</label>
                        <input type="email" id="studentRegEmail" required placeholder="your@email.com">
                    </div>
                    <div class="form-group">
                        <label for="studentRegPassword">Password:</label>
                        <input type="password" id="studentRegPassword" required placeholder="Enter password">
                    </div>
                    <button type="submit" class="btn btn-primary full-width">Register</button>
                    <p><a href="#" onclick="showLogin()">Back to Login</a></p>
                </form>
            </div>

            <div id="admin-tab" class="tab-content">
                <form id="adminLoginForm">
                    <div class="form-group">
                        <label for="adminEmail">Admin Email:</label>
                        <input type="email" id="adminEmail" required placeholder="admin@college.edu">
                    </div>
                    <div class="form-group">
                        <label for="adminPassword">Password:</label>
                        <input type="password" id="adminPassword" required placeholder="Enter admin password">
                    </div>
                    <button type="submit" class="btn btn-primary full-width">Admin Login</button>
                </form>
            </div>

            <div id="message" class="message"></div>
        </div>
    </main>

    <script src="js/api-client.js"></script>
    <script src="js/auth.js"></script>
</body>
</html>
