<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - Campus Events</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <nav class="navbar">
        <div class="container">
            <div class="logo">Campus Events - Admin</div>
            <div class="nav-links">
                <span id="adminEmail" class="user-email"></span>
                <button onclick="logout()" class="btn btn-danger">Logout</button>
            </div>
        </div>
    </nav>

    <main class="container">
        <div class="admin-layout">
            <aside class="admin-sidebar">
                <div class="sidebar-menu">
                    <button class="menu-item active" onclick="showSection('events')">All Events</button>
                    <button class="menu-item" onclick="showSection('create')">Create Event</button>
                </div>
            </aside>

            <div class="admin-content">
                <!-- Events List Section -->
                <section id="events-section" class="section active">
                    <h2>Manage Events</h2>
                    <div id="eventsTable" class="events-table">
                        <div class="loading">Loading events...</div>
                    </div>
                </section>

                <!-- Create Event Section -->
                <section id="create-section" class="section">
                    <h2>Create New Event</h2>
                    <form id="createEventForm" class="form-large">
                        <div class="form-group">
                            <label for="eventTitle">Event Title:</label>
                            <input type="text" id="eventTitle" required placeholder="Event title">
                        </div>
                        <div class="form-group">
                            <label for="eventDescription">Description:</label>
                            <textarea id="eventDescription" required placeholder="Event description" rows="4"></textarea>
                        </div>
                        <div class="form-row">
                            <div class="form-group">
                                <label for="eventDate">Date:</label>
                                <input type="date" id="eventDate" required>
                            </div>
                            <div class="form-group">
                                <label for="eventTime">Time:</label>
                                <input type="time" id="eventTime" required>
                            </div>
                        </div>
                        <div class="form-row">
                            <div class="form-group">
                                <label for="eventVenue">Venue:</label>
                                <input type="text" id="eventVenue" required placeholder="Event venue">
                            </div>
                            <div class="form-group">
                                <label for="eventCategory">Category:</label>
                                <select id="eventCategory" required>
                                    <option value="">Select Category</option>
                                    <option value="Technical">Technical</option>
                                    <option value="Cultural">Cultural</option>
                                    <option value="Sports">Sports</option>
                                    <option value="Placement">Placement</option>
                                </select>
                            </div>
                        </div>
                        <div class="form-row">
                            <div class="form-group">
                                <label for="eventCapacity">Capacity:</label>
                                <input type="number" id="eventCapacity" required placeholder="Max participants" min="1">
                            </div>
                            <div class="form-group">
                                <label for="eventOrganizer">Organizer:</label>
                                <input type="text" id="eventOrganizer" required placeholder="Organizer name">
                            </div>
                        </div>
                        <button type="submit" class="btn btn-primary">Create Event</button>
                    </form>
                </section>
            </div>
        </div>

        <div id="message" class="message"></div>
    </main>

    <!-- Edit Event Modal -->
    <div id="editModal" class="modal" style="display: none;">
        <div class="modal-content">
            <span class="close" onclick="closeEditModal()">&times;</span>
            <h2>Edit Event</h2>
            <form id="editEventForm" class="form-large">
                <input type="hidden" id="editEventId">
                <div class="form-group">
                    <label for="editEventTitle">Event Title:</label>
                    <input type="text" id="editEventTitle" required>
                </div>
                <div class="form-group">
                    <label for="editEventDescription">Description:</label>
                    <textarea id="editEventDescription" required rows="4"></textarea>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label for="editEventDate">Date:</label>
                        <input type="date" id="editEventDate" required>
                    </div>
                    <div class="form-group">
                        <label for="editEventTime">Time:</label>
                        <input type="time" id="editEventTime" required>
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label for="editEventVenue">Venue:</label>
                        <input type="text" id="editEventVenue" required>
                    </div>
                    <div class="form-group">
                        <label for="editEventCategory">Category:</label>
                        <select id="editEventCategory" required>
                            <option value="Technical">Technical</option>
                            <option value="Cultural">Cultural</option>
                            <option value="Sports">Sports</option>
                            <option value="Placement">Placement</option>
                        </select>
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label for="editEventCapacity">Capacity:</label>
                        <input type="number" id="editEventCapacity" required min="1">
                    </div>
                    <div class="form-group">
                        <label for="editEventOrganizer">Organizer:</label>
                        <input type="text" id="editEventOrganizer" required>
                    </div>
                </div>
                <button type="submit" class="btn btn-primary">Update Event</button>
            </form>
        </div>
    </div>

    <!-- Registrations Modal -->
    <div id="registrationsModal" class="modal" style="display: none;">
        <div class="modal-content registration-modal">
            <span class="close" onclick="closeRegistrationsModal()">&times;</span>
            <h2>Registered Students</h2>
            <div id="registrationsList"></div>
        </div>
    </div>

    <script src="js/api-client.js"></script>
    <script src="js/admin.js"></script>
</body>
</html>
